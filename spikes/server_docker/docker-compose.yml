version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yiboflow-db
    restart: always
    environment:
      POSTGRES_USER: yibo_admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: yiboflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yibo_admin -d yiboflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yiboflow-redis
    restart: always
    command: redis-server --requirepass secret_redis_pass
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret_redis_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: 
      context: ../../server
      dockerfile: Dockerfile
    container_name: yiboflow-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_DSN=postgres://yibo_admin:secret_password@postgres:5432/yiboflow?sslmode=disable
      - REDIS_URL=redis://:secret_redis_pass@redis:6379/0
      - JWT_SECRET=your_jwt_secret_key_change_me
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
