<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FB"/>
      <stop offset="1" stop-color="#EAF0F8"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5166F6"/>
      <stop offset="1" stop-color="#7A86F8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#8EA0B8" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .section { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .label { font: 700 10px 'Segoe UI', Arial, sans-serif; fill: #7A8394; letter-spacing: 1.1px; }
      .body { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .muted { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #6B7280; }
      .chip { font: 700 10px 'Segoe UI', Arial, sans-serif; fill: #5166F6; }
      .metric { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .code { font: 600 11px Consolas, 'Courier New', monospace; fill: #334155; }
      .term { font: 600 11px Consolas, 'Courier New', monospace; fill: #CBD5E1; }
      .term-green { font: 700 11px Consolas, 'Courier New', monospace; fill: #4ADE80; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <rect x="28" y="28" width="1384" height="904" rx="28" fill="#F8FBFF"/>

  <text x="64" y="88" class="title">FlowProbe 接入</text>
  <text x="64" y="114" class="muted">左侧保留 API 资产清单，右侧固定为高密度工作台，整体视觉与转发页保持同一套圆角卡片和紧凑操作样式。</text>

  <rect x="64" y="146" width="294" height="740" rx="20" fill="#FFFFFF" stroke="#DCE4EF" filter="url(#shadow)"/>
  <text x="88" y="184" class="section">接入 API 列表</text>
  <text x="88" y="205" class="muted">状态点 + 延迟 + 目标绑定</text>
  <rect x="222" y="165" width="112" height="34" rx="17" fill="url(#primary)"/>
  <text x="253" y="187" style="font:700 12px 'Segoe UI', Arial, sans-serif; fill:#FFF;">+ 新增 API</text>

  <rect x="88" y="224" width="246" height="38" rx="14" fill="#F7F9FC" stroke="#DCE4EF"/>
  <text x="106" y="248" class="muted">搜索名称 / 标签 / 模型</text>

  <g transform="translate(88 280)">
    <rect width="246" height="118" rx="16" fill="#EEF3FF" stroke="#B8C6FF"/>
    <circle cx="16" cy="18" r="5" fill="#22C55E"/>
    <text x="30" y="22" class="body">OpenAI Main</text>
    <rect x="161" y="8" width="73" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="175" y="22" class="muted">OpenAI</text>
    <text x="16" y="46" class="muted">OpenAI 兼容</text>
    <text x="98" y="46" class="muted">gpt-4.1</text>
    <text x="182" y="46" class="muted">12 ms</text>
    <rect x="16" y="66" width="86" height="24" rx="12" fill="#DCE6FF"/>
    <text x="31" y="82" class="chip">OpenAI 目标</text>
    <rect x="110" y="66" width="54" height="24" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="127" y="82" class="muted">prod</text>
  </g>

  <g transform="translate(88 414)">
    <rect width="246" height="104" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/>
    <circle cx="16" cy="18" r="5" fill="#EF4444"/>
    <text x="30" y="22" class="body">Claude Backup</text>
    <rect x="146" y="8" width="88" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="162" y="22" class="muted">Anthropic</text>
    <text x="16" y="46" class="muted">Anthropic</text>
    <text x="98" y="46" class="muted">claude-sonnet</text>
    <text x="194" y="46" class="muted">失败</text>
    <rect x="16" y="66" width="96" height="24" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="33" y="82" class="muted">备用 / 海外</text>
  </g>

  <g transform="translate(88 534)">
    <rect width="246" height="104" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/>
    <circle cx="16" cy="18" r="5" fill="#22C55E"/>
    <text x="30" y="22" class="body">Ollama Local</text>
    <rect x="166" y="8" width="68" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="186" y="22" class="muted">Ollama</text>
    <text x="16" y="46" class="muted">Local</text>
    <text x="66" y="46" class="muted">qwen3:30b</text>
    <text x="187" y="46" class="muted">48 ms</text>
    <rect x="16" y="66" width="59" height="24" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="34" y="82" class="muted">local</text>
  </g>

  <rect x="382" y="146" width="994" height="740" rx="20" fill="none"/>

  <rect x="382" y="146" width="994" height="310" rx="20" fill="#FFFFFF" stroke="#DCE4EF" filter="url(#shadow)"/>
  <text x="410" y="184" class="section">API 详情</text>
  <text x="410" y="205" class="muted">双列表单，凭证与高级配置压缩到同一个工作区内。</text>
  <rect x="1188" y="165" width="66" height="26" rx="13" fill="#DDF6E6"/>
  <text x="1206" y="182" style="font:700 10px 'Segoe UI', Arial, sans-serif; fill:#16A34A;">已启用</text>
  <rect x="1270" y="162" width="34" height="34" rx="12" fill="#FFF5F5" stroke="#F2B5B5"/>
  <text x="1283" y="184" style="font:700 13px 'Segoe UI', Arial, sans-serif; fill:#EF4444;">×</text>

  <rect x="410" y="224" width="220" height="56" rx="16" fill="#F8FAFD" stroke="#DCE4EF"/>
  <text x="428" y="244" class="label">最近探测</text>
  <text x="428" y="268" class="metric">12 ms</text>
  <text x="498" y="268" class="muted">接口可用，并成功返回模型列表</text>

  <rect x="648" y="224" width="256" height="56" rx="16" fill="#F8FAFD" stroke="#DCE4EF"/>
  <text x="666" y="244" class="label">当前绑定</text>
  <text x="666" y="268" class="metric">2</text>
  <text x="693" y="268" class="muted">OpenAI 目标 / Anthropic 目标</text>

  <g transform="translate(410 300)">
    <text x="0" y="0" class="label">名称</text>
    <rect x="0" y="12" width="220" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="16" y="38" class="body">OpenAI Main</text>
    <text x="252" y="0" class="label">服务商</text>
    <rect x="252" y="12" width="220" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="268" y="38" class="body">OpenAI</text>

    <text x="0" y="78" class="label">Base URL</text>
    <rect x="0" y="90" width="472" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="16" y="116" class="code">https://api.openai.com/v1</text>
    <rect x="430" y="97" width="28" height="28" rx="10" fill="#FFFFFF" stroke="#DCE4EF"/>
    <text x="439" y="116" class="muted">⧉</text>

    <text x="498" y="78" class="label">协议</text>
    <rect x="498" y="90" width="220" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="514" y="116" class="body">OpenAI Compatible</text>
    <text x="750" y="78" class="label">默认模型</text>
    <rect x="750" y="90" width="220" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="766" y="116" class="body">gpt-4.1</text>
  </g>

  <g transform="translate(410 446)">
    <text x="0" y="0" class="label">API KEY / SECRET</text>
    <rect x="0" y="12" width="560" height="42" rx="14" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="16" y="38" class="body">••••••••••••••••••••••••••••</text>
    <rect x="492" y="19" width="28" height="28" rx="10" fill="#FFFFFF" stroke="#DCE4EF"/>
    <text x="501" y="38" class="muted">◐</text>
    <rect x="526" y="19" width="28" height="28" rx="10" fill="#FFFFFF" stroke="#DCE4EF"/>
    <text x="535" y="38" class="muted">⧉</text>
  </g>

  <g transform="translate(990 300)">
    <rect x="0" y="0" width="356" height="34" rx="17" fill="#EEF3FF" stroke="#CBD8FF"/>
    <text x="22" y="22" class="chip">↔ 设为 OpenAI 目标</text>
    <rect x="0" y="46" width="356" height="34" rx="17" fill="#FFFFFF" stroke="#DCE4EF"/>
    <text x="22" y="68" class="muted">↔ 设为 Anthropic 目标</text>

    <rect x="0" y="98" width="356" height="84" rx="16" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="18" y="122" class="section">高级配置</text>
    <text x="18" y="144" class="muted">输入价格 / 输出价格 / 计价单位 / 币种，默认折叠。</text>
    <text x="328" y="123" class="muted">⌄</text>

    <rect x="0" y="200" width="104" height="36" rx="12" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="26" y="223" class="body">测试 API</text>
    <rect x="116" y="200" width="104" height="36" rx="12" fill="#F8FAFD" stroke="#DCE4EF"/>
    <text x="140" y="223" class="body">拉取模型</text>
    <rect x="232" y="200" width="124" height="36" rx="12" fill="url(#primary)"/>
    <text x="266" y="223" style="font:700 12px 'Segoe UI', Arial, sans-serif; fill:#FFF;">保存当前 API</text>
  </g>

  <rect x="382" y="474" width="486" height="412" rx="20" fill="#FFFFFF" stroke="#DCE4EF" filter="url(#shadow)"/>
  <text x="410" y="512" class="section">诊断日志</text>
  <text x="410" y="533" class="muted">只保留测试结果、协议识别和错误反馈，不再重复来源和服务商。</text>

  <rect x="410" y="552" width="430" height="108" rx="16" fill="#ECFDF3" stroke="#B7E5C7"/>
  <text x="430" y="580" style="font:700 12px 'Segoe UI', Arial, sans-serif; fill:#15803D;">OK_MODELS_FOUND</text>
  <text x="555" y="580" class="muted">接口可用，并成功返回模型列表</text>
  <text x="755" y="580" class="muted">12 ms</text>
  <text x="430" y="610" class="label">结论</text>
  <text x="430" y="629" class="body">可继续使用当前协议和地址。</text>
  <text x="620" y="610" class="label">认证状态</text>
  <text x="620" y="629" class="body">authorized</text>
  <text x="430" y="648" class="muted">模型数量 82  ·  识别协议 OpenAI Compatible</text>

  <rect x="410" y="678" width="430" height="176" rx="16" fill="#0F172A"/>
  <text x="430" y="706" class="term-green">$</text>
  <text x="448" y="706" class="term">probe credential="OpenAI Main" protocol="OpenAI Compatible"</text>
  <text x="430" y="732" class="term-green">$</text>
  <text x="448" y="732" class="term">base_url https://api.openai.com/v1</text>
  <text x="430" y="758" class="term-green">$</text>
  <text x="448" y="758" class="term">result OK_MODELS_FOUND auth=authorized protocol=openai</text>
  <text x="430" y="784" class="term-green">$</text>
  <text x="448" y="784" class="term">latency 12ms models=82</text>
  <text x="430" y="810" class="term-green">$</text>
  <text x="448" y="810" class="term">next action: save config and set default model</text>

  <rect x="890" y="474" width="486" height="412" rx="20" fill="#FFFFFF" stroke="#DCE4EF" filter="url(#shadow)"/>
  <text x="918" y="512" class="section">模型池</text>
  <text x="918" y="533" class="muted">本地搜索 + 标签流，局部滚动，不打断整页布局。</text>
  <rect x="918" y="552" width="430" height="38" rx="14" fill="#F7F9FC" stroke="#DCE4EF"/>
  <text x="936" y="576" class="muted">搜索模型名</text>

  <g transform="translate(918 614)">
    <rect width="98" height="32" rx="16" fill="#DCE6FF"/><text x="17" y="21" class="chip">gpt-4.1</text>
    <rect x="108" width="134" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="126" y="21" class="body">gpt-4.1-mini</text>
    <rect x="252" width="154" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="270" y="21" class="body">gpt-4o-realtime</text>
    <rect x="0" y="42" width="144" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="19" y="63" class="body">text-embedding-3</text>
    <rect x="154" y="42" width="106" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="179" y="63" class="body">o4-mini</text>
    <rect x="270" y="42" width="106" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="293" y="63" class="body">o3</text>
    <rect x="0" y="84" width="124" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="21" y="105" class="body">gpt-image-1</text>
    <rect x="134" y="84" width="172" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="153" y="105" class="body">gpt-4.1-nano-search</text>
    <rect x="316" y="84" width="90" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="338" y="105" class="body">tts-1</text>
    <rect x="0" y="126" width="140" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="20" y="147" class="body">whisper-large</text>
    <rect x="150" y="126" width="144" height="32" rx="16" fill="#FFFFFF" stroke="#DCE4EF"/><text x="169" y="147" class="body">gpt-4.1-audio</text>
  </g>
</svg>
