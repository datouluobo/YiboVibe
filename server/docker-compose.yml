version: '3.8'

services:
  # ==========================================
  # 1. 核心应用层 (YiboFlow Backend Engine)
  # 负责暴露外网 API，拦截请求并非对称加密转换
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yiboflow_api
    restart: unless-stopped
    ports:
      # 通过主机映射暴露，NAS中仅需允许该映射入口的防火墙
      - "${PORT:-8080}:8080"
    environment:
      # 将 Go 程序原本认定的 localhost 转变为内部网络的 DNS 节点别名 `host=db` / `redis...redis`
      - DB_DSN=host=db user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=5432 sslmode=disable TimeZone=Asia/Shanghai
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - GIN_MODE=${GIN_MODE:-release}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yiboflow_net

  # ==========================================
  # 2. 持久化数据层 (Postgres DB)
  # 完全不暴露到外网，保护底层全域所有权与元数据
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: yiboflow_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yiboflow_net

  # ==========================================
  # 3. 内存缓存及消息队列层 (Redis)
  # 无外网映射，杜绝勒索病毒裸扫风险
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: yiboflow_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yiboflow_net

# 管理Docker持久卷 (即重启和删容器均不丢数据)
volumes:
  pgdata:
  redisdata:

    # 专属极安全的内部网段，切分物理隔离屏障
networks:
  yiboflow_net:
    driver: bridge
