services:
  api:
    image: ${YIBOVIBE_API_IMAGE:-datouluobo/yibovibe-server:latest}
    container_name: yibovibe_api
    restart: unless-stopped
    environment:
      DB_DSN: host=db user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GIN_MODE: ${GIN_MODE:-release}
      PORT: 8080
      VAULT_DATA_DIR: /root/vault_data
    volumes:
      - vaultdata:/root/vault_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yibovibe_net

  ai_gateway:
    image: caddy:latest
    container_name: yibovibe_ai_gate
    restart: unless-stopped
    ports:
      - "${GATE_PORT:-11434}:11434"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
    networks:
      - yibovibe_net

  db:
    image: postgres:15-alpine
    container_name: yibovibe_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yibovibe_net

  redis:
    image: redis:7-alpine
    container_name: yibovibe_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yibovibe_net

volumes:
  pgdata:
  redisdata:
  vaultdata:

networks:
  yibovibe_net:
    driver: bridge
